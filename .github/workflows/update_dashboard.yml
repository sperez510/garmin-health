name: Update Health Dashboard

on:
  schedule:
    # Corre todos los días a las 2:00 AM hora Colombia (UTC-5 = 07:00 UTC)
    - cron: '0 7 * * *'
  workflow_dispatch:   # permite ejecutarlo manualmente desde GitHub

permissions:
  contents: write      # necesario para hacer commit del HTML generado

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install garminconnect

      - name: Descargar datos de Garmin Connect
        env:
          GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python src/fetch_garmin.py

      - name: Generar dashboard HTML
        run: python src/build_dashboard.py

      - name: Commit y push del dashboard actualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/garmin_data.json
          # Solo hace commit si hay cambios
          git diff --staged --quiet || git commit -m "🏃 Auto-update dashboard $(date +'%Y-%m-%d')"
          git push
